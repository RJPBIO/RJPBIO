<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="BIO-IGNICIÓN — Neural Bolt">
  <rect width="512" height="512" rx="112" fill="#0B1320"/>
  <defs>
    <linearGradient id="bioGrad" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"  stop-color="#A5F3FC"/>
      <stop offset="45%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#bioGrad)" stroke-width="16"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- outer brain envelope (lateral view, facing left) -->
    <path d="M 150 215
             C 168 148, 268 122, 358 156
             C 420 180, 444 242, 420 298
             C 410 328, 390 348, 372 360
             C 370 376, 354 382, 338 374
             C 326 368, 316 368, 308 374
             C 275 388, 226 392, 184 376
             C 142 360, 112 324, 108 282
             C 104 246, 118 216, 150 215"/>
    <!-- upper gyri -->
    <path d="M 188 212 C 224 196, 306 194, 352 218"/>
    <!-- central sulcus -->
    <path d="M 162 276 C 212 262, 322 266, 392 288"/>
    <!-- lateral fissure -->
    <path d="M 156 332 C 208 324, 292 334, 366 340"/>
    <!-- lightning bolt emerging from brainstem -->
    <path d="M 314 372 L 288 418 L 316 422 L 286 476"/>
  </g>
</svg>
