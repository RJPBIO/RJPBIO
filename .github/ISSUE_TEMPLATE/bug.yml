name: Bug report
description: Something is broken.
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    attributes: { label: What happened?, description: Clear description + expected vs. actual. }
    validations: { required: true }
  - type: textarea
    attributes: { label: Steps to reproduce }
    validations: { required: true }
  - type: input
    attributes: { label: Version / commit }
  - type: dropdown
    attributes: { label: Environment, options: [dev, staging, prod] }
  - type: textarea
    attributes: { label: Logs / screenshots / trace-id }
