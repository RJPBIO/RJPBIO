version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: "America/Mexico_City" }
    open-pull-requests-limit: 10
    groups:
      prod: { dependency-type: production }
      dev:  { dependency-type: development }
    labels: [deps]
    reviewers: [bio-ignicion/platform]

  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    labels: [deps, ci]
