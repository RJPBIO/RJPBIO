services:
  app:
    build: .
    environment:
      DATABASE_URL: postgresql://bio:bio@postgres:5432/bio
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-32-bytes-hex}
      AUTH_URL: http://localhost:3000
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bio
      POSTGRES_PASSWORD: bio
      POSTGRES_DB: bio
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bio"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]

volumes:
  pgdata:
