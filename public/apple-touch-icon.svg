<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sprint 53 — apple-touch-icon canónico = BioGlyph del producto.
  Replica BioIgnicionMark.jsx: halo + ring punteado + 3 rayos asimétricos
  (-30°, 210°, 90°) + núcleo con spark gradiente. Color phosphorCyan #22D3EE.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="BIO-IGNICIÓN">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="1"/>
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="#F1F4F9"/>
  <circle cx="90" cy="90" r="75.6" fill="url(#halo)"/>
  <circle cx="90" cy="90" r="64.26" fill="none" stroke="#22D3EE" stroke-width="2.7"
          stroke-dasharray="3.6 6.3" opacity="0.55"/>
  <line x1="90" y1="90" x2="143.0" y2="59.4" stroke="#22D3EE" stroke-width="9" stroke-linecap="round" opacity="1"/>
  <line x1="90" y1="90" x2="37.0" y2="59.4" stroke="#22D3EE" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
  <line x1="90" y1="90" x2="90" y2="151.2" stroke="#22D3EE" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
  <circle cx="90" cy="90" r="23.4" fill="url(#core)"/>
  <circle cx="90" cy="90" r="8.2" fill="#FDE68A" opacity="0.95"/>
</svg>
