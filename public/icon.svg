<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sprint 53 — icon canónico = BioGlyph (replicado de BioIgnicionMark.jsx).
  Antes era 3 círculos verdes con BIO-IGN debajo (legacy).
  Ahora: dark plate + cyan halo + ring punteado + 3 rayos asimétricos + spark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="BIO-IGNICIÓN">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="1"/>
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#F1F4F9"/>
  <circle cx="256" cy="256" r="215" fill="url(#halo)"/>
  <circle cx="256" cy="256" r="183" fill="none" stroke="#22D3EE" stroke-width="7.7"
          stroke-dasharray="10.2 17.9" opacity="0.5"/>
  <!-- rayos: cos(-π/6,7π/6,π/2) * 174 + 256 -->
  <line x1="256" y1="256" x2="406.7" y2="169.0" stroke="#22D3EE" stroke-width="25.6" stroke-linecap="round" opacity="1"/>
  <line x1="256" y1="256" x2="105.3" y2="169.0" stroke="#22D3EE" stroke-width="25.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="256" y2="430" stroke="#22D3EE" stroke-width="25.6" stroke-linecap="round" opacity="0.85"/>
  <circle cx="256" cy="256" r="66.6" fill="url(#core)"/>
  <circle cx="256" cy="256" r="23.3" fill="#FDE68A" opacity="0.95"/>
</svg>
