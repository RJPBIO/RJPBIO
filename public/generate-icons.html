<!DOCTYPE html>
<html><head><title>BIO-IGNICION Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:40px">
<h2>BIO-IGNICION — PWA Icon Generator</h2>
<p>Click each button to download the icon.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #333;margin:10px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #333;margin:10px"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="padding:12px 24px;margin:8px;cursor:pointer">Download 192x192</button>
<button onclick="dl('c512','icon-512.png')" style="padding:12px 24px;margin:8px;cursor:pointer">Download 512x512</button>
<script>
function draw(id, s) {
  const c = document.getElementById(id);
  const x = c.getContext('2d');
  const r = s * 0.1875; // corner radius ratio
  // Background
  x.fillStyle = '#0B0E14';
  x.beginPath();
  x.roundRect(0, 0, s, s, r);
  x.fill();
  const cx = s/2, cy = s/2;
  // Outer ring
  x.strokeStyle = '#059669'; x.lineWidth = s*0.016; x.globalAlpha = 0.3;
  x.beginPath(); x.arc(cx, cy, s*0.35, 0, Math.PI*2); x.stroke();
  // Dashed ring
  x.lineWidth = s*0.008; x.globalAlpha = 0.2; x.setLineDash([s*0.03, s*0.025]);
  x.beginPath(); x.arc(cx, cy, s*0.254, 0, Math.PI*2); x.stroke();
  x.setLineDash([]);
  // Inner ring
  x.strokeStyle = '#6366F1'; x.lineWidth = s*0.012; x.globalAlpha = 0.25;
  x.beginPath(); x.arc(cx, cy, s*0.156, 0, Math.PI*2); x.stroke();
  // Core glow
  x.globalAlpha = 0.6; x.fillStyle = '#059669';
  x.beginPath(); x.arc(cx, cy, s*0.055, 0, Math.PI*2); x.fill();
  // Core dot
  x.globalAlpha = 1; x.fillStyle = '#059669';
  x.beginPath(); x.arc(cx, cy, s*0.023, 0, Math.PI*2); x.fill();
  // Text
  x.globalAlpha = 0.7; x.fillStyle = '#059669';
  x.font = `800 ${s*0.082}px -apple-system, sans-serif`;
  x.textAlign = 'center'; x.letterSpacing = `${s*0.012}px`;
  x.fillText('BIO-IGN', cx, s*0.84);
}
draw('c192', 192);
draw('c512', 512);
function dl(id, name) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = name;
  a.click();
}
</script>
</body></html>
